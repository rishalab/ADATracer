version: "3.8"

services:
  neo4j:
    image: neo4j:5.18
    container_name: adatracer-neo4j
    environment:
      NEO4J_AUTH: neo4j/12345678
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  adatracer:
    build: .
    container_name: adatracer-app
    depends_on:
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: 12345678
    volumes:
      - ./datasets:/app/datasets
      - ./outputs:/app/outputs
      - ./:/app
    command: bash run_pipeline.sh

volumes:
  neo4j_data:
  neo4j_logs:

